services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: family_tree
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_password_123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./family-tree-api
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: secure_password_123
      DB_DATABASE: family_tree
      JWT_SECRET: super_secret_jwt_key_2024
      JWT_EXPIRES_IN: 24h
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASS: ""
      EMAIL_FROM: noreply@familytree.com
    depends_on:
      - db
    ports:
      - "5002:5000"

  ui:
    build: ./family-tree-ui
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://72.60.81.203:5002
    depends_on:
      - api
    ports:
      - "3002:3001"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8026:8025"
      - "1026:1025"

volumes:
  pgdata:
