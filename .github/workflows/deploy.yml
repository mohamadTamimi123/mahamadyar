name: Deploy to Production

on:
  workflow_run:
    workflows: ["CD"]
    types:
      - completed
    branches: [ main ]
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SSH secrets
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ] || [ -z "${{ secrets.SERVER_USER }}" ] || [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "❌ SSH secrets not configured. Please set SERVER_HOST, SERVER_USER, and SERVER_SSH_KEY in repository secrets."
            echo "Skipping deployment..."
            exit 0
          else
            echo "✅ SSH secrets configured. Proceeding with deployment..."
          fi

      - name: Deploy to server
        if: secrets.SERVER_HOST != '' && secrets.SERVER_USER != '' && secrets.SERVER_SSH_KEY != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /root/peligent
            
            # Pull latest changes
            git pull origin main
            
            # Stop existing containers
            docker-compose -f deploy/docker-compose.prod.yml down
            
            # Pull latest images
            docker-compose -f deploy/docker-compose.prod.yml pull
            
            # Start services
            docker-compose -f deploy/docker-compose.prod.yml up -d
            
            # Wait for services to be ready
            sleep 30
            
            # Health check
            curl -f http://localhost:5001/family-members || exit 1
            curl -f http://localhost:3001 || exit 1
            
            echo "Deployment completed successfully!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Production deployment successful!"
          else
            echo "❌ Production deployment failed!"
          fi
