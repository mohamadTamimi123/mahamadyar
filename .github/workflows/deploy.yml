name: Deploy to Production

on:
  workflow_run:
    workflows: ["CD"]
    types:
      - completed
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SSH secrets
        id: check-secrets
        run: |
          if [ -n "$SERVER_HOST" ] && [ -n "$SERVER_USER" ] && [ -n "$SERVER_SSH_KEY" ]; then
            echo "secrets_configured=true" >> $GITHUB_OUTPUT
            echo "✅ SSH secrets configured. Proceeding with deployment..."
          else
            echo "secrets_configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ SSH secrets not configured. Skipping deployment."
          fi

      - name: Debug SSH connection
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        run: |
          echo "🔍 Debugging SSH connection..."
          echo "Host: $SERVER_HOST"
          echo "User: $SERVER_USER"
          echo "Key length: ${#SERVER_SSH_KEY}"
          echo "Key preview: ${SERVER_SSH_KEY:0:50}..."
          
          # Create SSH key file with proper format
          echo "$SERVER_SSH_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          
          # Check key format
          echo "🔑 SSH Key format check:"
          head -1 /tmp/ssh_key
          tail -1 /tmp/ssh_key
          
          # Test SSH connection with verbose output
          ssh -v -o ConnectTimeout=10 -o StrictHostKeyChecking=no -i /tmp/ssh_key $SERVER_USER@$SERVER_HOST "echo 'SSH connection successful'" || echo "SSH connection failed"
          
          # Clean up
          rm -f /tmp/ssh_key

      - name: Deploy to server
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          debug: true
          script: |
            set -e
            cd /root/peligent || exit 1

            # Initialise repo if needed
            if [ ! -d ".git" ]; then
              echo "❌ Not a git repository. Initializing..."
              git init
              git remote add origin https://github.com/mohamadTamimi123/mahamadyar.git
            fi

            echo "🔗 Remote configuration:"
            git remote -v

            # Always checkout/update main branch correctly
            if git show-ref --verify --quiet refs/heads/main; then
              git fetch origin main
              git checkout main
              git reset --hard origin/main
            else
              git fetch origin main
              git checkout -B main origin/main
            fi

            echo "📊 Git log after pull:"
            git log --oneline -5 || true

            # Stop existing containers
            docker compose -f deploy/docker-compose.prod.yml down || true
            docker compose -f deploy/docker-compose.prod.yml pull
            docker compose -f deploy/docker-compose.prod.yml up -d

            # Simple retry health check
            for i in {1..5}; do
              sleep 10
              curl -f http://localhost:5001/family-members && curl -f http://localhost:3001 && break || echo "Retrying health check ($i)..."
              if [ "$i" -eq 5 ]; then
                echo "Health check failed after retries"
                exit 1
              fi
            done

            echo "✅ Deployment completed successfully!"

      - name: Manual deployment instructions
        if: steps.check-secrets.outputs.secrets_configured == 'false'
        run: |
          echo "🔧 Manual deployment required!"
          echo ""
          echo "To deploy manually on the server, run:"
          echo "cd /root/peligent"
          echo "git pull origin main"
          echo "docker compose -f deploy/docker-compose.prod.yml down"
          echo "docker compose -f deploy/docker-compose.prod.yml pull"
          echo "docker compose -f deploy/docker-compose.prod.yml up -d"
          echo ""
          echo "Or configure SSH secrets in GitHub repository settings."

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Production deployment successful!"
          else
            echo "❌ Production deployment failed!"
            echo "Check SSH key configuration or run manual deployment."
          fi
