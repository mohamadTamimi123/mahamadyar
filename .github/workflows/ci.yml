name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: family-tree-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: family-tree-api/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: |
          if [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ] || [ -f .eslintrc.json ]; then npm run lint --if-present; else echo "No eslint config"; fi
      - name: Build
        run: npm run build --if-present

  build-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: family-tree-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: family-tree-ui/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build --if-present


