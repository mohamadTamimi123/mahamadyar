name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: family-tree-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: family-tree-api/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: |
          if [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ] || [ -f .eslintrc.json ]; then 
            npm run lint --if-present
          else 
            echo "No eslint config found, skipping lint"
          fi
      
      - name: Run tests
        run: npm test --if-present
      
      - name: Build application
        run: npm run build --if-present
      
      - name: Check build artifacts
        run: |
          if [ -d "dist" ]; then
            echo "Build successful - dist directory exists"
            ls -la dist/
          else
            echo "Build failed - no dist directory"
            exit 1
          fi

  build-and-test-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: family-tree-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: family-tree-ui/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: |
          if [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ] || [ -f .eslintrc.json ] || [ -f "eslint.config.mjs" ]; then 
            npm run lint --if-present
          else 
            echo "No eslint config found, skipping lint"
          fi
      
      - name: Run type checking
        run: npx tsc --noEmit --if-present
      
      - name: Build application
        run: npm run build
      
      - name: Check build artifacts
        run: |
          if [ -d ".next" ]; then
            echo "Build successful - .next directory exists"
            ls -la .next/
          else
            echo "Build failed - no .next directory"
            exit 1
          fi

  docker-build-test:
    runs-on: ubuntu-latest
    needs: [build-and-test-api, build-and-test-ui]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: family-tree-api/Dockerfile
          push: false
          tags: shajare-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build UI Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: family-tree-ui/Dockerfile
          push: false
          tags: shajare-ui:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test Docker images
        run: |
          echo "Testing API image..."
          docker run --rm shajare-api:test node --version
          echo "Testing UI image..."
          docker run --rm shajare-ui:test node --version
          echo "Docker images built successfully!"
